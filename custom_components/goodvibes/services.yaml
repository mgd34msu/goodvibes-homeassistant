prompt:
  description: Submit an async prompt through the GoodVibes Home Assistant webhook.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: goodvibes
    message:
      required: true
      selector:
        text:
    conversation_id:
      default: home
      selector:
        text:
    device_id:
      default: goodvibes-daemon
      selector:
        text:
    entity_id:
      selector:
        text:
    area_id:
      selector:
        text:
    user_id:
      selector:
        text:
    display_name:
      default: Home Assistant
      selector:
        text:
    message_id:
      selector:
        text:
    provider_id:
      selector:
        text:
    model_id:
      selector:
        text:
    tools:
      selector:
        object:

run_agent:
  description: Submit an async task-style prompt through the GoodVibes remote-chat webhook.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: goodvibes
    task:
      required: true
      selector:
        text:
          multiline: true
    conversation_id:
      default: home
      selector:
        text:
    device_id:
      default: goodvibes-daemon
      selector:
        text:
    entity_id:
      selector:
        text:
    area_id:
      selector:
        text:
    user_id:
      selector:
        text:
    display_name:
      default: Home Assistant
      selector:
        text:
    message_id:
      selector:
        text:
    provider_id:
      selector:
        text:
    model_id:
      selector:
        text:
    tools:
      selector:
        object:

status:
  description: Inspect daemon, Home Assistant surface, or local remote-chat status.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: goodvibes
    agent_id:
      selector:
        text:
    run_id:
      selector:
        text:
    task_id:
      selector:
        text:
    session_id:
      selector:
        text:

cancel:
  description: Cancel a GoodVibes Home Assistant remote-chat session or message.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: goodvibes
    run_id:
      selector:
        text:
    task_id:
      selector:
        text:
    session_id:
      description: Remote-chat session ID returned by the daemon.
      selector:
        text:
    message_id:
      description: Message ID sent to the daemon for an active conversation turn.
      selector:
        text:

call_tool:
  description: Invoke a daemon-exposed Home Assistant tool.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: goodvibes
    tool:
      required: true
      selector:
        select:
          options:
            - homeassistant_manifest
            - homeassistant_status
            - homeassistant_states
            - homeassistant_state
            - homeassistant_services
            - homeassistant_call_service
            - homeassistant_fire_event
            - homeassistant_render_template
    input:
      selector:
        object:
