name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (default; validates only, does not publish) or release (publish the dispatched tag)"
        required: false
        type: choice
        options:
          - dry-run
          - release
        default: dry-run
      tag:
        description: "Tag to release, for example v0.5.67 (optional when dispatched --ref at the tag itself, as the zero-touch auto-release job does)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The plain tag-push path (push: tags: v*) always runs. A manual dispatch
    # only runs the real release when mode=release; the default mode=dry-run
    # dispatch is a no-op here (dry-run has no build-and-publish side effects
    # to preview beyond what CI's own gating jobs already validate).
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Validate tag matches manifest version
        run: |
          python <<'PY'
          import json
          import os
          import pathlib

          manifest = json.loads(
              pathlib.Path("custom_components/goodvibes/manifest.json").read_text()
          )
          event_name = os.environ["GITHUB_EVENT_NAME"]
          release_tag_input = os.environ.get("RELEASE_TAG", "")
          # workflow_dispatch with an explicit "tag" input uses it; otherwise
          # (including the zero-touch auto-release dispatch, which passes no
          # "tag" input and instead dispatches --ref at the tag itself) fall
          # back to the ref name, which is the tag for both a tag push and a
          # dispatch made --ref refs/tags/vX.
          tag = (
              release_tag_input
              if event_name == "workflow_dispatch" and release_tag_input
              else os.environ["GITHUB_REF_NAME"]
          )
          expected = f"v{manifest['version']}"

          if tag != expected:
              raise SystemExit(f"Release tag {tag} does not match manifest version {expected}")
          PY
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build sidebar panel assets
        working-directory: frontend
        run: |
          npm ci
          npm run build
          # The committed artifacts must already equal a fresh build, so a
          # rebuild at release time must not change the working tree.
          git diff --exit-code -- ../custom_components/goodvibes/frontend

      - name: Build release archive
        run: |
          mkdir -p dist
          zip -r dist/goodvibes.zip custom_components/goodvibes \
            -x '*/__pycache__/*' '*.pyc'

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/goodvibes.zip
