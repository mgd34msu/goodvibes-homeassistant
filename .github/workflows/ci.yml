name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate integration files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Check Python syntax
        run: python -m compileall custom_components/goodvibes

      - name: Check JavaScript syntax
        run: |
          find custom_components/goodvibes/frontend -name '*.js' -print0 \
            | xargs -0 -r -n1 node --check

      - name: Verify built frontend assets match source
        working-directory: frontend
        run: |
          npm ci
          npm run check

      - name: Check release metadata
        run: |
          python <<'PY'
          import json
          import pathlib
          import re

          root = pathlib.Path("custom_components/goodvibes")
          manifest = json.loads((root / "manifest.json").read_text())
          const_py = (root / "const.py").read_text()
          hacs = json.loads(pathlib.Path("hacs.json").read_text())

          version_match = re.search(
              r'^INTEGRATION_VERSION = "([^"]+)"$', const_py, re.MULTILINE
          )
          repo_match = re.search(
              r'^UPDATE_REPOSITORY = "([^"]+)"$', const_py, re.MULTILINE
          )

          if version_match is None:
              raise SystemExit("Missing INTEGRATION_VERSION in const.py")
          if repo_match is None:
              raise SystemExit("Missing UPDATE_REPOSITORY in const.py")

          version = version_match.group(1)
          repository = repo_match.group(1)
          repository_url = f"https://github.com/{repository}"

          if manifest["version"] != version:
              raise SystemExit(
                  f"manifest version {manifest['version']} != const version {version}"
              )
          if manifest["documentation"] != repository_url:
              raise SystemExit("manifest documentation does not match UPDATE_REPOSITORY")
          if manifest["issue_tracker"] != f"{repository_url}/issues":
              raise SystemExit("manifest issue_tracker does not match UPDATE_REPOSITORY")
          if repository.startswith("OWNER/") or "OWNER/" in const_py:
              raise SystemExit("Repository metadata still contains placeholder OWNER")
          if not hacs.get("zip_release") or hacs.get("filename") != "goodvibes.zip":
              raise SystemExit("hacs.json must point to goodvibes.zip release assets")
          PY

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run test suite
        run: python -m pytest

      - name: SDK version nudge (informational)
        run: |
          validated=$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("custom_components/goodvibes/const.py").read_text()
          match = re.search(r'^SDK_VALIDATED_VERSION = "([^"]+)"$', text, re.MULTILINE)
          print(match.group(1) if match else "unknown")
          PY
          )
          latest=$(npm view @pellux/goodvibes-sdk version 2>/dev/null || echo "unknown")
          echo "GoodVibes SDK — validated against: ${validated} ; latest on npm: ${latest}"
          if [ "${latest}" != "unknown" ] && [ "${validated}" != "${latest}" ]; then
            echo "::notice::@pellux/goodvibes-sdk latest is ${latest}, but the integration is validated against ${validated}. Re-validate the daemon contract and bump const.SDK_VALIDATED_VERSION."
          fi

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run HACS validation
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration
          comment: "false"

  # ---------------------------------------------------------------------------
  # Zero-touch release. Runs only after EVERY gating job above is green (its
  # `needs` covers all of them, so GitHub schedules it last and only on full
  # success), and only for pushes to main. When the release commit's version has
  # no tag yet, it creates the annotated tag at this SHA and dispatches
  # release.yml at that tag with mode=release.
  #
  # Why the dispatch (not just the tag push): a tag pushed with GITHUB_TOKEN does
  # NOT trigger workflows, so the tag alone would never start release.yml. The
  # documented exception is that a workflow_dispatch API call made with
  # GITHUB_TOKEN DOES create a run — so we push the tag (for provenance + the
  # manual redo path) and then explicitly dispatch the release at that tag ref.
  # Idempotent: an already-existing tag is a logged no-op.
  # ---------------------------------------------------------------------------
  auto-release:
    name: Auto-release (tag + dispatch on green)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - validate
      - tests
      - hassfest
      - hacs
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version from manifest.json
        id: version
        run: |
          version=$(python3 -c "import json; print(json.load(open('custom_components/goodvibes/manifest.json'))['version'])")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Tag the release and dispatch release.yml (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # Idempotent no-op if the tag already exists on the remote (a re-run,
          # or a manual tag already pushed): do not re-tag or re-dispatch.
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists on origin — nothing to do."
            exit 0
          fi
          git config user.name "GoodVibes CI"
          git config user.email "ci@goodvibes.local"
          git tag -a "${TAG}" -m "release ${VERSION}" "${SHA}"
          # Push with GITHUB_TOKEN: this does NOT trigger release.yml (token
          # pushes never trigger workflows), which is why we dispatch below.
          git push origin "refs/tags/${TAG}"
          echo "Created and pushed ${TAG} at ${SHA}."
          # Dispatch release.yml at the tag ref. workflow_dispatch via the API
          # under GITHUB_TOKEN DOES create a run (the documented exception).
          for attempt in 1 2 3 4 5 6 7 8; do
            if gh workflow run release.yml --ref "refs/tags/${TAG}" -f mode=release; then
              echo "Dispatched release.yml for ${TAG} (mode=release)."
              exit 0
            fi
            echo "gh workflow run failed (attempt ${attempt}/8); retrying in 7s…" >&2
            sleep 7
          done
          echo "ERROR: failed to dispatch release.yml for ${TAG} after 8 attempts." >&2
          exit 1
